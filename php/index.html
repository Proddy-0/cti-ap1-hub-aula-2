<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>PHP</title>
</head>

<body>
    <section class="subject-page">
        <a href="../index.html" class="back-link">← voltar ao hub</a>
        <h1>PHP</h1>
    </section>

    <!--
      ============================================================
      BLOCO DE CÓDIGO — PHP
      ============================================================
      Mesma estrutura: .code-block + .code-head + .code-body.
      Para destacar a sintaxe use os spans .tok-key / .tok-fn /
      .tok-str / .tok-num / .tok-com (definidos no CSS).
    -->
    <section class="wrap">
        <div class="code-block">
            <div class="code-head">
                <div class="dots"><span></span><span></span><span></span></div>
                <span class="filename">index.php <span class="lang">PHP</span></span>
            </div>
            <div class="code-body">
                <div class="line-numbers">
                    <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
                    <span>6</span><span>7</span><span>8</span>
                </div>
<pre><code><span class="tok-key">&lt;?php</span>
<span class="tok-com">// Saudação simples em PHP</span>
<span class="tok-key">$nome</span> = <span class="tok-str">"Mundo"</span>;

<span class="tok-key">function</span> <span class="tok-fn">saudacao</span>(<span class="tok-key">$n</span>) {
    <span class="tok-key">return</span> <span class="tok-str">"Olá, $n!"</span>;
}

<span class="tok-fn">echo</span> <span class="tok-fn">saudacao</span>(<span class="tok-key">$nome</span>);</code></pre>
            </div>
        </div>
    </section>

    <footer class="hub-footer">
        <p>Feito por Aysllan · Gabrieli · Luiza <br>Hub Aula 2</p>
    </footer>
</body>

</html>
